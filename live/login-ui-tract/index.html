<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" sizes="16x16" type="image/png" href="./images/fav.ico">
  <title>Login - Tract.</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-white">
  <!-- header -->
  <section class="relative w-full px-10 py-6 text-gray-700 bg-white body-font">
    <div class="container flex flex-col flex-wrap items-center justify-between py-5 mx-auto md:flex-row max-w-7xl">
      <a href="#_"
        class="relative z-10 flex items-center w-auto text-2xl font-extrabold leading-none text-black select-none">Tract.</a>
      <nav class="top-0 left-0 z-0 flex items-center justify-center w-full h-full py-5 -ml-0 space-x-6 text-base md:-ml-5 md:py-0 md:absolute">
        <a href="#_"
          class="relative font-semibold leading-6 text-gray-800 transition duration-150 ease-out hover:text-gray-500"
          x-data="{ hover: false }" @mouseenter="hover = true" @mouseleave="hover = false">
          <span class="block">Category</span>
          <span class="absolute bottom-0 left-0 inline-block w-full h-0.5 -mb-1 overflow-hidden">
            <span x-show="hover" class="absolute inset-0 inline-block w-full h-full transform bg-gray-900"
              x-transition:enter="transition ease duration-200" x-transition:enter-start="scale-0"
              x-transition:enter-end="scale-100" x-transition:leave="transition ease-out duration-300"
              x-transition:leave-start="scale-100" x-transition:leave-end="scale-0" style="display: none;"></span>
          </span>
        </a>
        <a href="#_"
          class="relative font-semibold leading-6 text-gray-800 transition duration-150 ease-out hover:text-gray-900"
          x-data="{ hover: false }" @mouseenter="hover = true" @mouseleave="hover = false">
          <span class="block">Tract For Business</span>
          <span class="absolute bottom-0 left-0 inline-block w-full h-0.5 -mb-1 overflow-hidden">
            <span x-show="hover" class="absolute inset-0 inline-block w-full h-full transform bg-gray-900"
              x-transition:enter="transition ease duration-200" x-transition:enter-start="scale-0"
              x-transition:enter-end="scale-100" x-transition:leave="transition ease-out duration-300"
              x-transition:leave-start="scale-100" x-transition:leave-end="scale-0" style="display: none;"></span>
          </span>
        </a>
        <a href="#_"
          class="relative font-semibold leading-6 text-gray-800 transition duration-150 ease-out hover:text-gray-900"
          x-data="{ hover: false }" @mouseenter="hover = true" @mouseleave="hover = false">
          <span class="block">
            Teach on Tract
            <span class="absolute right-5 bottom-3 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-green-500 transform translate-x-1/2 -translate-y-1/2 bg-green-50 rounded-full">New</span>
        </span>
          <span class="absolute bottom-0 left-0 inline-block w-full h-0.5 -mb-1 overflow-hidden">
            <span x-show="hover" class="absolute inset-0 inline-block w-full h-full transform bg-gray-900"
              x-transition:enter="transition ease duration-200" x-transition:enter-start="scale-0"
              x-transition:enter-end="scale-100" x-transition:leave="transition ease-out duration-300"
              x-transition:leave-start="scale-100" x-transition:leave-end="scale-0" style="display: none;"></span>
          </span>
        </a>
      </nav>
      <div class="relative z-10 inline-flex items-center space-x-6 md:ml-5 lg:justify-end">
        <a href="#" class="font-semibold rounded-lg focus:bg-green-50 hover:bg-green-50 px-4 py-2.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 focus:text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </a>
        <span class="inline-flex rounded-md shadow-sm">
          <a href="#"
            class="inline-flex items-center justify-center px-4 py-2 text-base font-medium leading-6 text-black whitespace-no-wrap bg-green-500 rounded-md hover:bg-green-200 focus:outline-none">
            Sign up
          </a>
        </span>
      </div>
    </div>
  </section>
  <!-- Main -->
  <section class="bg-white py-20 mx-auto md:flex-row max-w-7xl">
    <div class="px-4 mx-auto text-center max-w-7xl sm:px-6 lg:px-8">
      <h2 class="text-2xl font-extrabold tracking-tight text-black sm:text-3xl md:text-4xl xl:text-5xl">
        Login to Your Account
      </h2>
      <p class="max-w-md mx-auto mt-3 pt-6 px-12 text-xl text-gray-500 sm:text-lg md:mt-5 md:text-2xl md:max-w-3xl">
        Choose from 130,000 online courses with new additions <br>published every second month
      </p>     
    </div>
    <div class="flex flex-col md:flex-row xl:flex-row justify-center mx-32 my-16">
      <div class="px-6 py-6 flex flex-col space-y-5 w-5/12">
        <div class="relative rounded-md">
          <input type="text" name="id" id="id" class="text-lg pl-6 w-full h-20 border-2 rounded-lg focus:outline-none focus:bg-green-50 focus:border-green-500 border-black placeholder-gray-500 placeholder-opacity-100" placeholder="Techer / Student ID">
          <div class="absolute inset-y-0 right-0 pr-6 flex items-center pointer-events-none">
            <span class="text-black sm:text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M12 14l9-5-9-5-9 5 9 5z" />
                <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
              </svg>
            </span>
          </div>
        </div>    
        <div class="relative rounded-md">
          <input type="password" name="password" id="password" class="text-lg pl-6 w-full h-20 border-2 rounded-lg focus:outline-none focus:bg-green-50 focus:border-green-500 border-black placeholder-gray-500 placeholder-opacity-100" placeholder="8 Digit Pin">
          <div class="absolute inset-y-0 right-0 pr-6 flex items-center pointer-events-none">
            <span class="text-black sm:text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
                <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
              </svg>
            </span>
          </div>
        </div>
        <div class="relative rounded-md">
          <button class="text-xl font-bold w-full h-20 border-2 rounded-lg focus:outline-none border-green-500 bg-green-500 hover:bg-green-200 hover:border-green-500">
            Login to Your Account
          </button>
          <div class="absolute inset-y-0 right-0 pr-6 flex items-center pointer-events-none">
            <span class="text-black sm:text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="ml-12 w-6 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
              </svg>
            </span>
          </div>
        </div>        
      </div>      
        <div class="pr-0 md:pr-12 py-0 flex flex-col space-y-5 w-auto invisible md:visible">     
          <p class="h-20"></p>     
          <p type="submit" class="py-12 pr-8 pl-12 h-20 text-dark text-4xl select-none">/</p>
          <p class="h-20"></p>
        </div>
      <div class="py-6 flex flex-col space-y-5 w-5/12">
        <button class="h-20 text-lg inline-flex pt-6 mr-0 pl-5 rounded-lg border-2 border-black hover:bg-green-50 hover:border-green-500 focus:outline-none"><i class="fab fa-google text-3xl"></i><span class="pl-6 text-xl font-semibold">Sigin with Google</span></button>
        <button class="h-20 text-lg inline-flex pt-6 mr-0 pl-5 rounded-lg border-2 border-black hover:bg-green-50 hover:border-green-500 focus:outline-none"><i class="fab fa-facebook-f text-3xl"></i><span class="pl-8 text-xl font-semibold">Sigin with Facebook</span></button>
        <button class="h-20 text-lg inline-flex pt-6 mr-0 pl-5 rounded-lg border-2 border-black hover:bg-green-50 hover:border-green-500 focus:outline-none"><i class="fab fa-apple text-4xl"></i><span class="pl-6 text-xl font-semibold">Sigin with Apple Account</span></button>
      </div>
    </div>
    <div class="justify-center text-center">
      <a href="#" class="underline text-lg">Fogot password?</a>
    </div>
  </section>
  <section class="container flex flex-row flex-wrap items-center justify-between py-5 px-10 mx-auto max-w-7xl">
    <a href="#" class="text-lg">Privacy Policy</a>
    <a href="#" class="text-lg">Copyright@Tract 2021</a>
  </section>
</body>
</html>
